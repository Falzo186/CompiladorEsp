# Configuración del Proyecto CompiladorEsp
# Archivo de propiedades para build y desarrollo

# ====== Versiones ======
project.version=1.0.0
project.name=CompiladorEsp
project.description=Compilador para lenguaje EspañolJava

# ====== Rutas ======
src.dir=src
src.main=src/main/java
src.test=src/test
grammar.dir=grammar
build.dir=build
dist.dir=dist
docs.dir=docs
resources.dir=resources

# ====== Compilación ======
source.version=11
target.version=11
compiler.encoding=UTF-8

# ====== ANTLR4 ======
antlr4.version=4.13.0
antlr4.main.grammar=grammar/MiLenguaje.g4
antlr4.options=-Dlanguage=Java -visitor -no-listener

# ====== Dependencias ======
antlr4.runtime=org.antlr:antlr4-runtime:4.13.0
junit.version=4.13.2
